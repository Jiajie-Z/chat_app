<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script defer src="catCart.js"></script>
  <title>Cat Shop</title>
</head>

<body>
  <div class="app">
    <h1>Cats on sale!</h1>
    <div class="products"></div>
    <button class="view-cart-btn visible button">View Cart</button>
    <button class="hide-cart-btn hidden button">Hide Cart</button>
    <div class="cart-container hidden ">
      <h2>Your Cart</h2>
      <div class="cart-items"></div>
      <button class="checkout-btn button">Checkout</button>
    </div>
  </div>

</body>

</html>
